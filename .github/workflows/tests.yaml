name: Test
on:
  pull_request:
    branches: [ main, dev ]

jobs:
  tests:
    name: Run Lua Firewall Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 #v4.1.0

      - name: Build test image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf #v6.5.0
        with:
          file: nginx.local.dockerfile
          target: test
          load: true
          tags: test-firewall
          cache-from: type=gha,scope=lua-test
          cache-to: type=gha,mode=max,scope=lua-test

      - name: Run tests
        run: |
          docker run --rm \
            --network host \
            -e REDIS_HOST=localhost \
            -e REDIS_DB=1 \
            test-firewall
