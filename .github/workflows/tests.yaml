name: Test
on:
  pull_request:
    branches: [ main, dev ]

jobs:
  tests:
    name: Run Lua Firewall Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 #v4.1.0

      - name: Build test image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a #v6.5.0
        with:
          context: .
          file: nginx.local.dockerfile
          target: test
          load: true
          tags: test-firewall
          cache-from: type=gha,scope=lua-test
          cache-to: type=gha,mode=max,scope=lua-test

      - name: Run tests
        run: |
          docker run --rm \
            --network host \
            -e REDIS_HOST=localhost \
            -e REDIS_DB=1 \
            test-firewall
