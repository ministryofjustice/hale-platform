upstream wordpress {
    # Use TCP connection
    server wordpress:9000;
}
map $uri $blogname{
    ~^(?P<blogpath>/[^/]+/)files/(.*)       $blogpath;
}
map $blogname $blogid{
    default -999;
    #Ref: http://wordpress.org/extend/plugins/nginx-helper/
    #include /var/www/wordpress/wp-content/plugins/nginx-helper/map.conf ;
}
# Firewall info variable — default "-" (never touched by Lua) until firewall.req()
# runs and sets it. Must be a `map` (not `set`) so internal redirects
# (e.g. error_page → /error.html) do not re-run rewrite-phase `set` and clobber
# the value Lua wrote.
map $host $firewall_info {
    default "-";
}
server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    ssl_certificate /etc/nginx/certs/self-signed/hale.docker.pem;
    ssl_certificate_key /etc/nginx/certs/self-signed/hale.docker-key.pem;
    server_name _;
    root /var/www/html;

    # Define the file to load in order within our root dir
    index index.php;

    location ^~ /firewall/ {
        access_log off;
        client_body_buffer_size 1m;
        client_max_body_size    1m;
        content_by_lua_block {
            require("firewall.admin").handle_route()
        }
    }

    location ~ ^(/[^/]+)?/files/(.+) {
        try_files /wp-content/blogs.dir/$blogid/files/$2 /wp-includes/ms-files.php?file=$2;
        access_log off;     
        log_not_found off; 
        expires max;
    }
     #avoid php readfile()
    location ^~ /blogs.dir {
        internal;
        alias /var/www/html/wp-content/blogs.dir;
        access_log off;
        log_not_found off;
        expires max;
    }
    # Take care when modifying this block — introducing '?' into a replacement string
    # could trigger the CVE-2026-42945 vulnerability.
    if (!-e $request_filename) {
        rewrite /wp-admin$ $scheme://$host$uri/ permanent;
        rewrite ^(/[^/]+)?(/wp-.*) $2 last;
        rewrite ^(/[^/]+)?(/.*\.php) $2 last;
    }
    location / {
        try_files $uri $uri/ /index.php?$args;
    }
    location ~ \.php$ {
        # Firewall: check bans, score request
        access_by_lua_block {
            require("firewall").req()
        }

        try_files $uri =404;
        include fastcgi_params;
        fastcgi_intercept_errors on;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass wordpress;
        fastcgi_read_timeout 1000;
        proxy_connect_timeout 1000s;
        proxy_send_timeout 1000s;
        proxy_read_timeout 1000s;

        # Firewall: penalize bad responses
        log_by_lua_block {
            require("firewall").res()
        }
    }
    # Static files - Added CSS, JS, and other web assets
    # Not included: file types supported by wp-document-revisions plugin (doc, docx, pdf, xls, xlsx zip).
    location ~* ^.+\.(css|js|ogg|ogv|svg|svgz|eot|otf|woff|woff2|mp4|ttf|rss|atom|jpg|jpeg|gif|png|ico|tgz|gz|rar|bz2|exe|ppt|tar|mid|midi|wav|bmp|rtf|webp|map)$ {
        access_log off; 
        log_not_found off; 
        expires max;
        # Allow following symlinks
        disable_symlinks off;
    }
}
