worker_processes auto;

pid /tmp/nginx.pid; # Changed from /var/run/nginx.pid
# error_log /var/log/nginx/error.log;
error_log /dev/stderr info;

include /etc/nginx/modules-enabled/*.conf;

events {
      worker_connections 1024; 
}

http {
        # Use system DNS resolver (from /etc/resolv.conf)
        resolver local=on valid=10s ipv6=off;

        ##
        # Basic Settings
        ##

        sendfile on;
        tcp_nopush on;
        types_hash_max_size 2048;
        server_tokens off;

        server_names_hash_bucket_size 64;
        server_name_in_redirect off;

        # include /etc/nginx/mime.types;
        include /usr/local/openresty/nginx/conf/mime.types;
        default_type application/octet-stream;

        fastcgi_buffers 16 16k; 
        fastcgi_buffer_size 32k;

        client_max_body_size 400m;
        client_body_timeout 600s;

        ##
        # SSL Settings
        ##

        ssl_protocols TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
        ssl_prefer_server_ciphers on;

        ##
        # Logging Settings
        ##

        #accss_log /var/log/nginx/access.log;
        # error_log /var/log/nginx/error.log;
        error_log /dev/stderr info;

        ##
        # Gzip Settings
        ##

       gzip on;

        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_buffers 16 8k;
        gzip_http_version 1.1;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        ##
        # Virtual Host Configs
        ##

        #   include /etc/nginx/conf.d/*.conf;
        #   include /etc/nginx/sites-enabled/*;
        include /usr/local/openresty/nginx/conf/conf.d/*.conf;
        include /usr/local/openresty/nginx/conf/sites-enabled/*;
      
        # Lua module path
        lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";
}
