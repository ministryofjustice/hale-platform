upstream wordpress {
    # Use TCP connection
    server 127.0.0.1:9000;
}
map $uri $blogname{
    ~^(?P<blogpath>/[^/]+/)files/(.*)       $blogpath;
}
map $blogname $blogid{
    default -999;
    #Ref: http://wordpress.org/extend/plugins/nginx-helper/
    #include /var/www/wordpress/wp-content/plugins/nginx-helper/map.conf ;
}
# Firewall info variable — default "-" (never touched by Lua) until firewall.req()
# runs and sets it. Must be a `map` (not `set`) so internal redirects
# (e.g. error_page → /error.html) do not re-run rewrite-phase `set` and clobber
# the value Lua wrote.
map $host $firewall_info {
    default "-";
}
# Page cache status ("hit"/"miss"/"bypass"/"off"/"down") — set by the page cache
# Lua module and surfaced in the access log. A `map` (not `set`) for the same
# reason as $firewall_info above.
map $host $pagecache_status {
    default "-";
}
server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;
    root /var/www/html;

    # Define the file to load in order within our root dir
    index index.php;

    # Include Justice legacy redirects (only for the production www host)
    if ($host = "www.justice.gov.uk") {
        include /usr/local/openresty/nginx/conf/justice/redirects.conf;
    }

    # Custom error pages — hide OpenResty branding
    error_page 400 401 403 405 408 500 502 503 504 /error.html;
    location = /error.html {
        root /usr/local/openresty/nginx/html/error-pages;
        ssi on;
        internal;
    }
    
    # FastCGI request buffering
    fastcgi_request_buffering off;

    # Page cache bypass rules (request method, query string, admin/auth URIs,
    # logged-in cookies) live in the Lua module: opt/lua/pagecache/init.lua.

    location ~ ^(/[^/]+)?/files/(.+) {
        try_files /wp-content/blogs.dir/$blogid/files/$2 /wp-includes/ms-files.php?file=$2;
        access_log off;
        log_not_found off;
        expires max;
    }
     #avoid php readfile()
    location ^~ /blogs.dir {
        internal;
        alias /var/www/html/wp-content/blogs.dir;
        access_log off;
        log_not_found off;
        expires max;
    }
    # Take care when modifying this block — introducing '?' into a replacement string
    # could trigger the CVE-2026-42945 vulnerability.
    if (!-e $request_filename) {
        rewrite /wp-admin$ $scheme://$host$uri/ permanent;
        rewrite ^(/[^/]+)?(/wp-.*) $2 last;
        rewrite ^(/[^/]+)?(/.*\.php) $2 last;
    }
    location / {
        try_files $uri $uri/ /index.php?$args;
    }
    location ~ \.php$ {
        # Firewall: check bans, score request. Page cache: serve a HIT from Redis
        # (skips PHP entirely), otherwise flag the request to be stored on MISS.
        access_by_lua_block {
            require("firewall").req()
            require("pagecache").fetch()
        }

        include fastcgi_params;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_intercept_errors on;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass wordpress;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 600;

        # Page cache: decide if the response is storeable, then buffer the HTML.
        header_filter_by_lua_block {
            require("pagecache").filter_headers()
        }
        body_filter_by_lua_block {
            require("pagecache").capture_body()
        }

        # Firewall: penalize bad responses. Page cache: persist the HTML to Redis.
        log_by_lua_block {
            require("firewall").res()
            require("pagecache").store()
        }
    }
    # Video files - handle separately for streaming support
    # We currently use a CDN so this tecnically is not used but I have left it here
    # so that our nginx config at least supports it
    location ~* \.(mp4|webm|mov|avi|flv|wmv|m4v)$ {
        mp4;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        log_not_found off;
        expires max;
    }
    
    # Other static files (removed video extensions: ogg, ogv, mp4)
    # Not included: file types supported by wp-document-revisions plugin (doc, docx, pdf, xls, xlsx zip).
    location ~* ^.+\.(css|js|svg|svgz|eot|otf|woff|ttf|rss|atom|jpg|jpeg|gif|png|ico|tgz|gz|rar|bz2|exe|ppt|tar|mid|midi|wav|bmp|rtf)$ {
        access_log off; log_not_found off; expires max;
    }

    location ^~ /firewall/ {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        access_log off;
        client_body_buffer_size 1m;
        client_max_body_size    1m;
        content_by_lua_block {
            require("firewall.admin").handle_route()
        }
    }
    
    location = /robots.txt { access_log off; log_not_found off; }
    # Security
    location ^~ /wp-login.php {
        # Block access to default login without invoking PHP
        deny all;
    }
    location = /xmlrpc.php {
        deny all;
    }
    # deny access to dotfiles and dotdirectories, except .well-known
    # this will deny access to .git, .htaccess, .env, and other sensitive files
    location ~ /\.(?!well-known).* {
        deny all;
    }
	# Deny access to any files with a .php extension in the uploads directory
	# Works in sub-directory installs and also in multisite network
	# Keep logging the requests to parse later (or to pass to firewall utilities such as fail2ban)
	location ~* /(?:uploads|files)/.*\.php$ {
		deny all;
	}
}
